<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هضيم | عدسة الوجه الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --h-green: #10b981; --h-rose: #f43f5e; --h-dark: #0f172a; }
        body { font-family: 'Cairo', sans-serif; background-color: #000; color: white; margin: 0; overflow: hidden; height: 100vh; }
        
        /* Camera Viewport */
        .lens-viewport { height: 42vh; position: relative; background: #000; overflow: hidden; }
        #v { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Face Mask Overlay - Filter only applies here */
        .face-mask-overlay {
            position: absolute;
            inset: 0;
            z-index: 15;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .face-filter-area {
            width: 190px;
            height: 250px;
            border-radius: 50% 50% 45% 45%;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 0 500px rgba(0,0,0,0.3); 
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #faceCanvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            filter: none;
            transition: filter 0.8s ease;
        }

        /* Filter Styles */
        .filter-glow { filter: saturate(1.6) contrast(1.1) brightness(1.1) sepia(0.05) !important; }
        .filter-stress { filter: saturate(0.4) contrast(0.9) brightness(0.85) sepia(0.25) !important; }

        /* UI Panel */
        .ui-panel { 
            height: 58vh; background: #fff; border-radius: 40px 40px 0 0; 
            padding: 25px 20px; color: var(--h-dark); overflow-y: auto; 
            box-shadow: 0 -20px 60px rgba(0,0,0,0.5); position: relative; z-index: 20;
        }

        .header-section { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; }
        .header-section h1 { font-size: 34px; font-weight: 900; color: var(--h-green); line-height: 1; }
        
        .btn-main { 
            background: var(--h-dark); color: white; width: 100%; padding: 18px; border-radius: 20px;
            font-size: 18px; font-weight: 900; border: none; cursor: pointer; margin-bottom: 25px;
        }

        .food-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .item-card { 
            background: #f8fafc; border: 2.5px solid transparent; padding: 12px 4px; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; transition: 0.3s; cursor: pointer;
        }
        .item-card.sel-h { border-color: var(--h-green); background: #ecfdf5; }
        .item-card.sel-u { border-color: var(--h-rose); background: #fff1f2; }
        .item-card .icon { font-size: 24px; margin-bottom: 4px; }
        .item-card .label { font-size: 10px; font-weight: 800; }

        /* Report */
        #reportBackdrop { 
            position: fixed; inset: 0; z-index: 100; background: white; 
            display: none; flex-direction: column; overflow-y: auto; padding: 40px 25px;
        }
        .infographic-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .impact-tag { font-size: 11px; font-weight: 800; padding: 5px 12px; border-radius: 10px; margin: 3px; display: inline-block; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="no-scrollbar">

    <!-- Lens Viewport -->
    <div class="lens-viewport">
        <!-- Background Video (Natural) -->
        <video id="v" autoplay playsinline muted></video>
        
        <!-- Masking Area (Filtered) -->
        <div class="face-mask-overlay">
            <div class="face-filter-area" id="maskBorder">
                <canvas id="faceCanvas"></canvas>
            </div>
            
            <!-- Guidance UI -->
            <div class="absolute text-[10px] font-black tracking-widest bg-black/60 px-4 py-1.5 rounded-full top-[80%] backdrop-blur-md border border-white/20">
                وجهك داخل النطاق
            </div>
        </div>

        <div class="absolute top-5 right-5">
            <div class="bg-black/50 backdrop-blur-lg px-4 py-2 rounded-full text-[10px] font-black border border-white/10 flex items-center gap-2 shadow-2xl">
                <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></div>
                عدسة هضيم التغذوية
            </div>
        </div>
    </div>

    <!-- UI Panel -->
    <div class="ui-panel no-scrollbar">
        <div class="header-section">
            <h1>هضيم</h1>
            <p class="text-[10px] font-bold text-slate-400">تحليل الملامح عبر النمط الغذائي</p>
        </div>

        <button onclick="openReport()" class="btn-main">استخراج تحليل هضيم AI</button>

        <div class="mb-6">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 text-right pr-2">مدة الالتزام بالنمط</h3>
            <div class="flex gap-2">
                <button onclick="setM(1)" id="m1" class="flex-1 py-3 rounded-2xl bg-slate-900 text-white text-xs font-black transition-all">شهر</button>
                <button onclick="setM(2)" id="m2" class="flex-1 py-3 rounded-2xl bg-slate-100 text-slate-400 text-xs font-black transition-all">شهرين</button>
                <button onclick="setM(3)" id="m3" class="flex-1 py-3 rounded-2xl bg-slate-100 text-slate-400 text-xs font-black transition-all">3 أشهر</button>
            </div>
        </div>

        <div id="grid" class="food-grid mb-10"></div>
    </div>

    <!-- Analytics Report -->
    <div id="reportBackdrop" class="no-scrollbar">
        <div class="flex justify-between items-start border-b-4 border-emerald-500 pb-8 mb-8">
            <div>
                <h1 class="text-3xl font-black text-slate-900 leading-tight">هضيم</h1>
                <p class="text-sm font-bold text-slate-400">التقرير الفني للتغذية والجمال</p>
            </div>
            <button onclick="closeReport()" class="p-3 bg-slate-100 rounded-full text-slate-400">✕</button>
        </div>

        <div id="scoreDisplay" class="rounded-3xl p-10 text-center mb-8">
            <div id="scoreValue" class="text-7xl font-black">0%</div>
            <div id="scoreMsg" class="text-xs font-black mt-2">جاري التحليل...</div>
        </div>

        <div class="grid grid-cols-1 gap-4 mb-6">
            <div class="infographic-box">
                <h3 class="font-black text-slate-800 mb-3 text-sm">👁️ الأثر الظاهري المتوقع</h3>
                <div id="faceList" class="flex flex-wrap"></div>
            </div>
        </div>

        <div class="infographic-box bg-slate-900 text-white border-none p-6">
            <h3 class="text-[10px] font-black text-emerald-400 mb-4 uppercase tracking-tighter">التفصيل الكيميائي والمجهري:</h3>
            <div id="chemMap" class="space-y-4 text-[11px] font-bold"></div>
        </div>

        <div id="verdictBox" class="p-8 border-r-8 border-emerald-500 bg-emerald-50 rounded-3xl mt-6 mb-10">
            <h3 class="text-xl font-black text-slate-800 mb-2">رؤية هضيم AI</h3>
            <p id="verdictTxt" class="text-sm font-medium text-slate-600 leading-relaxed"></p>
        </div>

        <button onclick="window.print()" class="w-full py-5 bg-slate-900 text-white rounded-3xl font-black shadow-lg">حفظ التقرير PDF</button>
    </div>

    <script>
        const FOOD_DB = [
            { id: 'fish', name: 'أسماك', icon: '🐟', type: 'h', chem: 'أوميغا 3 + فسفور', pos: ['نضارة العين', 'لمعان الشعر'], neg: [], desc: 'يعزز مرونة الأغشية الخلوية.' },
            { id: 'veg', name: 'خضروات', icon: '🥦', type: 'h', chem: 'فيتامين C', pos: ['تفتيح الهالات', 'بشرة متوهجة'], neg: [], desc: 'يحفز الكولاجين الطبيعي ويقاوم الأكسدة.' },
            { id: 'meat', icon: '🥩', name: 'لحوم', type: 'h', chem: 'حديد + B12', pos: ['توريد الوجنتين', 'بناء عضلي'], neg: [], desc: 'يمنع شحوب وفقر الدم ونقص الأكسجين.' },
            { id: 'water', icon: '💧', name: 'ماء', type: 'h', chem: 'H2O', pos: ['ليونة الجلد', 'نقاء المسام'], neg: [], desc: 'ينظف السموم خارج الخلايا ويرطب الأنسجة.' },
            { id: 'sugar', icon: '🍰', name: 'حلويات', type: 'u', chem: 'سكر مكرر', pos: [], neg: ['شحوب الوجه', 'تجاعيد مبكرة'], desc: 'يسبب عملية الجليكيشن التي تكسر الكولاجين.' },
            { id: 'fast', icon: '🍔', name: 'وجبات', type: 'u', chem: 'دهون مهدرجة', pos: [], neg: ['انتفاخ الجفون', 'بشرة دهنية'], desc: 'يزيد الالتهابات الجلدية ويسد المسام.' },
            { id: 'soda', icon: '🥤', name: 'غازيات', type: 'u', chem: 'كافيين + صوديوم', pos: [], neg: ['بهتان الشعر', 'جفاف'], desc: 'يسبب خللاً في توازن السوائل ويضعف العظام.' },
            { id: 'fried', icon: '🍟', name: 'مقليات', type: 'u', chem: 'أوميغا 6 زائد', pos: [], neg: ['إجهاد العين', 'خمول'], desc: 'يعيق تدفق الدم الدقيق في الشعيرات الدموية.' }
        ];

        let selected = new Set();
        let currentM = 1;

        const grid = document.getElementById('grid');
        grid.innerHTML = FOOD_DB.map(f => `
            <div onclick="toggleItem('${f.id}')" id="card-${f.id}" class="item-card">
                <div class="icon">${f.icon}</div>
                <div class="label">${f.name}</div>
            </div>
        `).join('');

        const video = document.getElementById('v');
        const canvas = document.getElementById('faceCanvas');
        const ctx = canvas.getContext('2d');

        async function startLens() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } 
                });
                video.srcObject = s;
                requestAnimationFrame(updateFaceCanvas);
            } catch(e) { console.error("Camera access denied"); }
        }

        function updateFaceCanvas() {
            if (video.paused || video.ended) return;
            
            const size = Math.min(video.videoWidth, video.videoHeight);
            const sx = (video.videoWidth - size) / 2;
            const sy = (video.videoHeight - size) / 2;
            
            canvas.width = 300;
            canvas.height = 400;
            
            ctx.drawImage(video, sx, sy, size, size, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(updateFaceCanvas);
        }

        function toggleItem(id) {
            const el = document.getElementById(`card-${id}`);
            const item = FOOD_DB.find(x => x.id === id);
            selected.has(id) ? selected.delete(id) : selected.add(id);
            el.classList.toggle(item.type === 'h' ? 'sel-h' : 'sel-u');
            applyFilters();
        }

        function setM(m) {
            currentM = m;
            [1,2,3].forEach(v => {
                const btn = document.getElementById(`m${v}`);
                btn.className = v === m ? 
                    'flex-1 py-3 rounded-2xl bg-slate-900 text-white text-xs font-black' : 
                    'flex-1 py-3 rounded-2xl bg-slate-100 text-slate-400 text-xs font-black';
            });
            applyFilters();
        }

        function applyFilters() {
            const mask = document.getElementById('faceCanvas');
            const border = document.getElementById('maskBorder');
            
            if(selected.size === 0) {
                mask.className = "";
                border.style.borderColor = "rgba(255,255,255,0.3)";
                return;
            }

            let h = 0, u = 0;
            selected.forEach(id => FOOD_DB.find(x => x.id === id).type === 'h' ? h++ : u++);
            const score = h / (h + u);

            if(score >= 0.6) {
                mask.className = "filter-glow";
                border.style.borderColor = "var(--h-green)";
            } else {
                mask.className = "filter-stress";
                border.style.borderColor = "var(--h-rose)";
            }
            mask.style.opacity = 0.7 + (currentM * 0.1);
        }

        function openReport() {
            if(selected.size === 0) return;
            document.getElementById('reportBackdrop').style.display = 'flex';
            
            let h = 0, u = 0;
            let positives = new Set(), negatives = new Set(), chems = [];

            selected.forEach(id => {
                const item = FOOD_DB.find(x => x.id === id);
                item.type === 'h' ? h++ : u++;
                item.pos.forEach(p => positives.add(p));
                item.neg.forEach(n => negatives.add(n));
                chems.push(item);
            });

            const score = Math.round((h / (h + u)) * 100);
            document.getElementById('scoreValue').innerText = score + "%";
            document.getElementById('scoreDisplay').className = score >= 70 ? 
                "rounded-3xl p-10 text-center mb-8 bg-emerald-50 border-2 border-emerald-500 text-emerald-700" : 
                "rounded-3xl p-10 text-center mb-8 bg-rose-50 border-2 border-rose-500 text-rose-700";
            
            document.getElementById('scoreMsg').innerText = score >= 70 ? "كفاءة حيوية مرتفعة" : "رصد تراجع في جودة الأنسجة";

            document.getElementById('faceList').innerHTML = [...positives].map(p => `<span class="impact-tag bg-emerald-100 text-emerald-800">${p}</span>`).join('') +
                                                             [...negatives].map(n => `<span class="impact-tag bg-rose-100 text-rose-800">${n}</span>`).join('');

            document.getElementById('chemMap').innerHTML = chems.map(c => `
                <div class="border-b border-slate-700 pb-3">
                    <div class="flex items-center gap-2 mb-1">
                        <span>${c.icon}</span>
                        <span class="text-emerald-400">${c.name}:</span>
                        <span class="text-slate-400 text-[9px]">${c.chem}</span>
                    </div>
                    <div class="text-slate-300">${c.desc}</div>
                </div>`).join('');
            
            document.getElementById('verdictTxt').innerText = score >= 70 ? 
                `بناءً على النمط المختار، يتوقع محرك هضيم AI أن تزداد كثافة الشعيرات الدموية الدقيقة في الوجه، مما يعطي نضارة "الفلتر الطبيعي" خلال مدة ${currentM} شهر.` : 
                `تنبيه: التراكم الكيميائي للعناصر المختارة قد يسبب تراجعاً في مرونة ألياف الإيلاستين، مما يجعل ملامح الوجه تبدو أكثر إجهاداً عما هي عليه الآن بعد مرور ${currentM} شهر.`;
        }

        function closeReport() { document.getElementById('reportBackdrop').style.display = 'none'; }
        window.onload = startLens;
    </script>
</body>
</html>
