<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عدسة هضيم التغذوية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --h-green: #10b981; --h-rose: #f43f5e; --h-dark: #0f172a; }
        body { font-family: 'Cairo', sans-serif; background-color: #000; color: white; margin: 0; overflow: hidden; height: 100vh; }
        
        /* Camera Viewport */
        .lens-viewport { height: 45vh; position: relative; background: #000; overflow: hidden; }
        #v { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); filter: grayscale(0.2) brightness(0.9); }
        
        /* The Masked Face Area */
        .face-mask-overlay {
            position: absolute;
            inset: 0;
            z-index: 15;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .face-filter-area {
            width: 200px;
            height: 270px;
            border-radius: 50% 50% 45% 45%;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); /* Creates the spotlight effect */
            border: 3px solid rgba(255,255,255,0.2);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #faceCanvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            transition: filter 0.5s ease;
        }

        /* VIBRANT FILTERS */
        .filter-glow { 
            filter: saturate(1.8) contrast(1.1) brightness(1.15) sepia(0.1) blur(0.3px) !important; 
        }
        .filter-stress { 
            filter: saturate(0.3) contrast(1.2) brightness(0.8) hue-rotate(-10deg) !important; 
        }
        
        /* Extra Glow Layers */
        .glow-layer {
            position: absolute; inset: 0; pointer-events: none; opacity: 0; transition: opacity 0.5s;
        }
        .healthy-glow { background: radial-gradient(circle, rgba(16,185,129,0.2) 0%, transparent 70%); }
        .unhealthy-shadow { background: radial-gradient(circle, rgba(244,63,94,0.15) 0%, rgba(0,0,0,0.4) 100%); }

        /* UI Panel */
        .ui-panel { 
            height: 55vh; background: #fff; border-radius: 40px 40px 0 0; 
            padding: 25px 20px; color: var(--h-dark); overflow-y: auto; 
            box-shadow: 0 -20px 60px rgba(0,0,0,0.5); position: relative; z-index: 20;
        }

        .header-section { text-align: center; margin-bottom: 20px; }
        .header-section h1 { font-size: 28px; font-weight: 900; color: var(--h-dark); letter-spacing: -1px; }
        
        .btn-main { 
            background: var(--h-dark); color: white; width: 100%; padding: 18px; border-radius: 20px;
            font-size: 18px; font-weight: 900; border: none; cursor: pointer; margin-bottom: 25px;
            transition: transform 0.2s;
        }
        .btn-main:active { transform: scale(0.98); }

        .food-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .item-card { 
            background: #f1f5f9; border: 3px solid transparent; padding: 12px 4px; border-radius: 22px;
            display: flex; flex-direction: column; align-items: center; transition: 0.3s; cursor: pointer;
        }
        .item-card.sel-h { border-color: var(--h-green); background: #f0fdf4; transform: translateY(-5px); }
        .item-card.sel-u { border-color: var(--h-rose); background: #fef2f2; transform: translateY(-5px); }
        .item-card .icon { font-size: 26px; margin-bottom: 4px; }
        .item-card .label { font-size: 10px; font-weight: 800; }

        /* Report */
        #reportBackdrop { 
            position: fixed; inset: 0; z-index: 100; background: white; 
            display: none; flex-direction: column; overflow-y: auto; padding: 40px 25px;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="no-scrollbar">

    <!-- Lens Viewport -->
    <div class="lens-viewport">
        <video id="v" autoplay playsinline muted></video>
        
        <div class="face-mask-overlay">
            <div class="face-filter-area" id="maskBorder">
                <canvas id="faceCanvas"></canvas>
                <!-- Color Overlays for Instant Feedback -->
                <div id="healthyGlow" class="glow-layer healthy-glow"></div>
                <div id="unhealthyShadow" class="glow-layer unhealthy-shadow"></div>
            </div>
            
            <div id="statusTag" class="absolute text-[10px] font-black bg-white text-black px-4 py-1.5 rounded-full top-[82%] shadow-xl border border-black/10 transition-all duration-500">
                عدسة هضيم: بانتظار التحليل
            </div>
        </div>

        <div class="absolute top-6 right-6">
            <div class="bg-black/60 backdrop-blur-md px-4 py-2 rounded-2xl text-[11px] font-bold border border-white/10 flex items-center gap-3">
                <div id="pulseDot" class="w-2.5 h-2.5 rounded-full bg-white animate-pulse"></div>
                هضيم AI LIVE
            </div>
        </div>
    </div>

    <!-- UI Panel -->
    <div class="ui-panel no-scrollbar">
        <div class="header-section">
            <h1 class="text-emerald-500">عدسة هضيم التغذوية</h1>
            <p class="text-[11px] font-bold text-slate-400">اختر نمطك الغذائي لتشاهد الأثر الحيوي على ملامحك</p>
        </div>

        <button onclick="openReport()" class="btn-main shadow-lg shadow-emerald-100">تحليل النتائج النهائية</button>

        <div class="mb-6">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 text-right pr-2">فترة المحاكاة الزمنية</h3>
            <div class="flex gap-2">
                <button onclick="setM(1)" id="m1" class="flex-1 py-3 rounded-2xl bg-slate-900 text-white text-xs font-black transition-all">30 يوم</button>
                <button onclick="setM(2)" id="m2" class="flex-1 py-3 rounded-2xl bg-slate-100 text-slate-400 text-xs font-black transition-all">60 يوم</button>
                <button onclick="setM(3)" id="m3" class="flex-1 py-3 rounded-2xl bg-slate-100 text-slate-400 text-xs font-black transition-all">90 يوم</button>
            </div>
        </div>

        <div id="grid" class="food-grid mb-10"></div>
    </div>

    <!-- Report Modal (Summary) -->
    <div id="reportBackdrop" class="no-scrollbar">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black">تقرير هضيم الرقمي</h2>
            <button onclick="closeReport()" class="text-2xl">✕</button>
        </div>
        <div id="finalScore" class="p-12 rounded-[40px] text-center mb-6">
             <div id="scoreNum" class="text-8xl font-black mb-2">0%</div>
             <p id="scoreLabel" class="font-bold"></p>
        </div>
        <div id="details" class="space-y-4">
            <!-- Dynamic Content -->
        </div>
        <button onclick="location.reload()" class="mt-8 w-full py-5 bg-black text-white rounded-3xl font-bold">إعادة الفحص</button>
    </div>

    <script>
        const FOOD_DB = [
            { id: 'fish', name: 'أسماك', icon: '🐟', type: 'h' },
            { id: 'veg', name: 'خضار', icon: '🥦', type: 'h' },
            { id: 'meat', name: 'بروتين', icon: '🥩', type: 'h' },
            { id: 'water', name: 'لترين ماء', icon: '💧', type: 'h' },
            { id: 'sugar', name: 'سكريات', icon: '🍰', type: 'u' },
            { id: 'fast', name: 'سريع', icon: '🍔', type: 'u' },
            { id: 'soda', name: 'غازيات', icon: '🥤', type: 'u' },
            { id: 'fried', name: 'مقليات', icon: '🍟', type: 'u' }
        ];

        let selected = new Set();
        let currentM = 1;

        const grid = document.getElementById('grid');
        grid.innerHTML = FOOD_DB.map(f => `
            <div onclick="toggleItem('${f.id}')" id="card-${f.id}" class="item-card">
                <div class="icon">${f.icon}</div>
                <div class="label">${f.name}</div>
            </div>
        `).join('');

        const video = document.getElementById('v');
        const canvas = document.getElementById('faceCanvas');
        const ctx = canvas.getContext('2d');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                requestAnimationFrame(draw);
            } catch(e) { alert("يرجى السماح بالوصول للكاميرا"); }
        }

        function draw() {
            const size = Math.min(video.videoWidth, video.videoHeight);
            const offset = (video.videoWidth - size) / 2;
            canvas.width = 400;
            canvas.height = 540;
            ctx.drawImage(video, offset, 0, size, size * 1.35, 0, 0, 400, 540);
            requestAnimationFrame(draw);
        }

        function toggleItem(id) {
            selected.has(id) ? selected.delete(id) : selected.add(id);
            updateUI();
        }

        function setM(m) {
            currentM = m;
            [1,2,3].forEach(i => document.getElementById(`m${i}`).className = i === m ? 'flex-1 py-3 rounded-2xl bg-slate-900 text-white text-xs font-black' : 'flex-1 py-3 rounded-2xl bg-slate-100 text-slate-400 text-xs font-black');
            updateUI();
        }

        function updateUI() {
            let h = 0, u = 0;
            FOOD_DB.forEach(f => {
                const el = document.getElementById(`card-${f.id}`);
                if(selected.has(f.id)) {
                    el.classList.add(f.type === 'h' ? 'sel-h' : 'sel-u');
                    f.type === 'h' ? h++ : u++;
                } else {
                    el.classList.remove('sel-h', 'sel-u');
                }
            });

            const total = h + u;
            const score = total === 0 ? 0.5 : h / total;
            const canvasEl = document.getElementById('faceCanvas');
            const status = document.getElementById('statusTag');
            const hGlow = document.getElementById('healthyGlow');
            const uShadow = document.getElementById('unhealthyShadow');
            const dot = document.getElementById('pulseDot');

            if(total === 0) {
                canvasEl.className = "";
                status.innerText = "بانتظار اختيار نمطك";
                hGlow.style.opacity = 0;
                uShadow.style.opacity = 0;
                dot.style.backgroundColor = "white";
                return;
            }

            // High Strength Filter Logic
            const intensity = 0.4 + (currentM * 0.2); // Increases with time (months)

            if(score > 0.5) {
                canvasEl.className = "filter-glow";
                status.innerText = "هضيم: ملامح نضرة وحيوية";
                status.className = "absolute text-[10px] font-black bg-emerald-500 text-white px-4 py-1.5 rounded-full top-[82%] shadow-xl";
                hGlow.style.opacity = intensity;
                uShadow.style.opacity = 0;
                dot.style.backgroundColor = "#10b981";
            } else {
                canvasEl.className = "filter-stress";
                status.innerText = "هضيم: رصد شحوب وإجهاد";
                status.className = "absolute text-[10px] font-black bg-rose-500 text-white px-4 py-1.5 rounded-full top-[82%] shadow-xl";
                uShadow.style.opacity = intensity;
                hGlow.style.opacity = 0;
                dot.style.backgroundColor = "#f43f5e";
            }
        }

        function openReport() {
            if(selected.size === 0) return;
            const report = document.getElementById('reportBackdrop');
            report.style.display = 'flex';
            
            let h = 0;
            selected.forEach(id => { if(FOOD_DB.find(x => x.id === id).type === 'h') h++; });
            const finalScore = Math.round((h / selected.size) * 100);
            
            document.getElementById('scoreNum').innerText = finalScore + "%";
            const box = document.getElementById('finalScore');
            
            if(finalScore >= 70) {
                box.className = "p-12 rounded-[40px] text-center mb-6 bg-emerald-500 text-white";
                document.getElementById('scoreLabel').innerText = "توهج خلوي مكتمل";
            } else {
                box.className = "p-12 rounded-[40px] text-center mb-6 bg-rose-500 text-white";
                document.getElementById('scoreLabel').innerText = "تحذير من إجهاد الأنسجة";
            }
        }

        function closeReport() { document.getElementById('reportBackdrop').style.display = 'none'; }

        initCamera();
    </script>
</body>
</html>
