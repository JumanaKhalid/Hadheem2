<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>هضيم - غذاؤك إما داؤك وإما دواؤك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; overflow: hidden; height: 100vh; }
        
        /* AR Lens Styling */
        .camera-view { height: 40vh; position: relative; background: #000; overflow: hidden; }
        #v { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .ar-frame-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none;
        }
        .face-mask {
            width: 220px; height: 300px; border-radius: 110px 110px 80px 80px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.8); border: 3px solid rgba(255,255,255,0.1);
            position: relative; overflow: hidden;
        }
        #faceCanvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: all 0.8s ease-in-out; }

        /* UI Panel */
        .main-panel { 
            height: 60vh; background: #ffffff; border-radius: 40px 40px 0 0; 
            padding: 20px; overflow-y: auto; box-shadow: 0 -15px 40px rgba(0,0,0,0.1);
            position: relative; z-index: 50; margin-top: -30px;
        }

        .food-item {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1.5px solid #f1f5f9; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; padding: 10px; border-radius: 20px;
        }
        .food-item.active-dawaa { background: #f0fdf4; border-color: #22c55e; transform: translateY(-3px); box-shadow: 0 4px 12px rgba(34, 197, 94, 0.15); }
        .food-item.active-daa { background: #fef2f2; border-color: #ef4444; transform: translateY(-3px); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.15); }

        #fullReport {
            position: fixed; inset: 0; z-index: 1000; background: #fff; display: none;
            flex-direction: column; padding: 20px; overflow-y: auto;
        }

        .progress-container { height: 12px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 1.2s ease-out; }
        
        .grid-basket { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    </style>
</head>
<body>

    <!-- عدسة هضيم التغذوية AR -->
    <div class="camera-view">
        <video id="v" autoplay playsinline muted></video>
        <div class="ar-frame-overlay">
            <div class="face-mask">
                <canvas id="faceCanvas"></canvas>
            </div>
            <div class="mt-4 bg-black/40 backdrop-blur-md px-4 py-1 rounded-full border border-white/20">
                <span class="text-[10px] text-white font-bold tracking-widest">عدسة هضيم التغذوية AR</span>
            </div>
        </div>
    </div>

    <!-- واجهة المستخدم -->
    <div class="main-panel">
        <header class="mb-4 text-center">
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">هضيم</h1>
            <p class="text-xs font-bold text-emerald-600">غذاؤك إما داؤك وإما دواؤك</p>
        </header>

        <!-- مدة الالتزام -->
        <div class="mb-6 bg-slate-50 p-4 rounded-3xl border border-slate-100">
            <div class="flex justify-between text-[11px] font-black mb-2 px-1">
                <span class="text-slate-500 uppercase tracking-tighter">مدة الالتزام بهذا النمط:</span>
                <span id="durLabel" class="text-emerald-600">أسبوع واحد</span>
            </div>
            <input type="range" id="durSlider" min="1" max="4" value="1" 
                class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-500">
        </div>

        <!-- سلة الغذاء -->
        <h3 class="text-[10px] font-black text-slate-400 mb-3 px-2 uppercase tracking-[0.2em]">سلة الغذاء الأساسية</h3>
        <div class="grid-basket mb-8" id="foodGrid">
            <!-- Items injected via JS -->
        </div>

        <button onclick="generateReport()" class="w-full py-5 bg-slate-900 text-white rounded-3xl font-black text-lg shadow-xl hover:bg-black transition-all">
            تحليل هضيم AI
        </button>

        <footer class="mt-6 text-center pb-8">
            <p class="text-[9px] text-slate-400 font-medium px-4">هذا المحتوى مصمم بالذكاء الاصطناعي ويسترشد بمعلومات وزارة الصحة السعودية</p>
        </footer>
    </div>

    <!-- التقرير النهائي (هضيم AI) -->
    <div id="fullReport">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-2xl font-black text-slate-900">تقرير هضيم AI</h2>
                <p class="text-[10px] font-bold text-slate-500">تحليل استباقي للحالة الصحية</p>
            </div>
            <button onclick="closeReport()" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full font-bold">✕</button>
        </div>

        <!-- ملخص مؤشر الصحة -->
        <div class="bg-slate-900 p-6 rounded-[35px] text-white shadow-2xl mb-6 relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-[10px] font-bold opacity-60 mb-2 uppercase tracking-widest">مؤشر جودة الغذاء</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-6xl font-black" id="scoreValue">0</span>
                    <span class="text-2xl font-bold opacity-50">%</span>
                </div>
                <div class="progress-container bg-white/10 mt-6">
                    <div id="scoreProgress" class="progress-fill bg-emerald-400 shadow-[0_0_15px_rgba(52,211,153,0.5)]" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div id="reportSections" class="space-y-4"></div>

        <!-- تنبيهات ذكية -->
        <div id="aiAlerts" class="mt-6"></div>

        <div class="mt-8 pb-10 space-y-3">
            <button onclick="window.print()" class="w-full py-4 bg-slate-100 text-slate-900 rounded-2xl font-black text-sm">تصدير التقرير PDF</button>
            <button onclick="location.reload()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black text-sm">إعادة تحليل سلة جديدة</button>
        </div>
    </div>

    <script>
        const FOOD_DATA = [
            { id: 1, name: 'فواكه', icon: '🍎', cat: 'دواء' },
            { id: 2, name: 'خضار', icon: '🥦', cat: 'دواء' },
            { id: 3, name: 'ماء', icon: '💧', cat: 'دواء' },
            { id: 4, name: 'أسماك', icon: '🐟', cat: 'دواء' },
            { id: 5, name: 'دجاج', icon: '🍗', cat: 'دواء' },
            { id: 6, name: 'لحوم', icon: '🥩', cat: 'دواء' },
            { id: 7, name: 'بقوليات', icon: '🫘', cat: 'دواء' },
            { id: 8, name: 'مكسرات', icon: '🥜', cat: 'دواء' },
            { id: 9, name: 'حليب', icon: '🥛', cat: 'دواء' },
            { id: 10, name: 'أجبان', icon: '🧀', cat: 'دواء' },
            { id: 11, name: 'عصير طازج', icon: '🥤', cat: 'دواء' },
            { id: 12, name: 'مقليات', icon: '🍟', cat: 'داء' },
            { id: 13, name: 'وجبات سريعة', icon: '🍔', cat: 'داء' },
            { id: 14, name: 'مشروبات غازية', icon: '🥤', cat: 'داء' },
            { id: 15, name: 'حلويات', icon: '🍰', cat: 'داء' },
            { id: 16, name: 'سكاكر', icon: '🍬', cat: 'داء' }
        ];

        let cart = new Set();
        const video = document.getElementById('v');
        const canvas = document.getElementById('faceCanvas');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('durSlider');
        const label = document.getElementById('durLabel');
        const durations = ["أسبوع واحد", "شهر كامل", "6 أشهر", "سنة كاملة"];

        slider.oninput = function() {
            label.innerText = durations[this.value - 1];
            applyArEffect();
        };

        function init() {
            const grid = document.getElementById('foodGrid');
            grid.innerHTML = FOOD_DATA.map(f => `
                <div onclick="toggleCart(${f.id})" id="item-${f.id}" class="food-item bg-white">
                    <span class="text-xl mb-1">${f.icon}</span>
                    <span class="text-[8px] font-black text-slate-700 text-center">${f.name}</span>
                </div>
            `).join('');
            startCamera();
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                requestAnimationFrame(drawLoop);
            } catch(e) { console.warn("Camera check: Running in simulation mode"); }
        }

        function drawLoop() {
            canvas.width = 400; canvas.height = 550;
            ctx.drawImage(video, 0, 0, 400, 550);
            requestAnimationFrame(drawLoop);
        }

        function toggleCart(id) {
            const item = FOOD_DATA.find(x => x.id === id);
            const el = document.getElementById(`item-${id}`);
            if(cart.has(id)) {
                cart.delete(id);
                el.className = 'food-item bg-white';
            } else {
                cart.add(id);
                el.classList.add(item.cat === 'دواء' ? 'active-dawaa' : 'active-daa');
            }
            applyArEffect();
        }

        function applyArEffect() {
            if(cart.size === 0) { canvas.style.filter = "none"; return; }
            
            let dawayCount = 0;
            cart.forEach(id => { if(FOOD_DATA.find(x => x.id === id).cat === 'دواء') dawayCount++; });

            const healthRatio = dawayCount / cart.size;
            const timeWeight = slider.value / 4; // تأثير الوقت (كلما زاد الوقت زاد التأثير البصري)

            if(healthRatio >= 0.6) {
                // تأثير صحي: نضارة وسطوع
                const saturation = 1 + (0.5 * timeWeight);
                const brightness = 1 + (0.1 * timeWeight);
                canvas.style.filter = `saturate(${saturation}) brightness(${brightness}) contrast(1.1)`;
            } else {
                // تأثير ضار: شحوب وظلال
                const gray = (1 - healthRatio) * 100 * timeWeight;
                const dim = 1 - (0.3 * timeWeight);
                canvas.style.filter = `grayscale(${gray}%) brightness(${dim}) contrast(1.3) sepia(15%)`;
            }
        }

        function generateReport() {
            if(cart.size === 0) return;
            document.getElementById('fullReport').style.display = 'flex';
            
            let daway = [], daa = [];
            cart.forEach(id => {
                const f = FOOD_DATA.find(x => x.id === id);
                f.cat === 'دواء' ? daway.push(f) : daa.push(f);
            });

            const score = Math.round((daway.length / cart.size) * 100);
            document.getElementById('scoreValue').innerText = score;
            document.getElementById('scoreProgress').style.width = score + "%";

            const durationText = durations[slider.value - 1];

            // بناء أقسام التقرير
            let sectionsHtml = `
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-emerald-50 p-5 rounded-[30px] border border-emerald-100">
                        <h4 class="text-emerald-900 text-[11px] font-black mb-3">🟢 عناصر الدواء:</h4>
                        <div class="space-y-1">
                            ${daway.map(d => `<div class="text-[9px] font-bold text-emerald-700">✓ ${d.name}</div>`).join('')}
                        </div>
                    </div>
                    <div class="bg-rose-50 p-5 rounded-[30px] border border-rose-100">
                        <h4 class="text-rose-900 text-[11px] font-black mb-3">🔴 عناصر الداء:</h4>
                        <div class="space-y-1">
                            ${daa.map(d => `<div class="text-[9px] font-bold text-rose-700">✗ ${d.name}</div>`).join('')}
                        </div>
                    </div>
                </div>
            `;

            // تحليل هضيم AI الاستشرافي
            let aiText = "";
            if (score >= 80) {
                aiText = `الاستمرار لمدة <b>${durationText}</b> سيؤدي لتعزيز التوازن الهرموني وتحسن ملحوظ في جودة النوم والنشاط البدني.`;
            } else if (score >= 50) {
                aiText = `خلال <b>${durationText}</b>، قد تواجه تذبذباً في مستويات الطاقة؛ زيادة عناصر "الدواء" ستوازن العمليات الحيوية لديك.`;
            } else {
                aiText = `تحذير: الالتزام بهذا النمط لمدة <b>${durationText}</b> قد يرفع من احتمالية حدوث التهابات داخلية وتراجع في كفاءة الأيض.`;
            }

            sectionsHtml += `
                <div class="bg-slate-50 p-6 rounded-[35px] border-l-4 border-slate-900">
                    <h4 class="text-slate-900 text-xs font-black mb-2 italic">استشراف هضيم AI المستقبلي:</h4>
                    <p class="text-[11px] font-bold text-slate-600 leading-relaxed">${aiText}</p>
                </div>
            `;

            document.getElementById('reportSections').innerHTML = sectionsHtml;
        }

        function closeReport() {
            document.getElementById('fullReport').style.display = 'none';
        }

        window.onload = init;
    </script>
</body>
</html>
